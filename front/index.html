<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMarket | Premium Groceries</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-cat { background-color: #ea580c !important; color: white !important; border-color: #ea580c !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-orange-600 p-1.5 rounded-lg shadow-lg shadow-orange-200">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <h1 class="text-xl font-bold text-gray-900">Market<span class="text-orange-600">OS</span></h1>
            </div>

            <div class="flex-1 max-w-md mx-8">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Search products..." 
                           class="w-full bg-gray-100 border-none rounded-xl py-2.5 pl-10 pr-4 focus:ring-2 focus:ring-orange-500 transition text-sm">
                    <svg class="w-4 h-4 absolute left-3 top-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <a href="admin.html" class="hidden sm:block text-sm font-medium text-gray-500 hover:text-orange-600">Admin Portal</a>
                <div class="relative p-2 bg-gray-100 rounded-full cursor-pointer hover:bg-gray-200 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span id="cartCount" class="absolute -top-1 -right-1 bg-orange-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div id="filterBar" class="flex gap-3 mb-10 overflow-x-auto no-scrollbar pb-2">
            <button onclick="applyFilter('')" class="cat-btn active-cat px-6 py-2 rounded-full border border-gray-200 bg-white text-sm font-semibold transition-all">All Items</button>
            <button onclick="applyFilter('Beverages')" class="cat-btn px-6 py-2 rounded-full border border-gray-200 bg-white text-sm font-semibold text-gray-600 hover:border-orange-300 transition-all">Beverages</button>
            <button onclick="applyFilter('Dairy')" class="cat-btn px-6 py-2 rounded-full border border-gray-200 bg-white text-sm font-semibold text-gray-600 hover:border-orange-300 transition-all">Dairy</button>
            <button onclick="applyFilter('Snacks')" class="cat-btn px-6 py-2 rounded-full border border-gray-200 bg-white text-sm font-semibold text-gray-600 hover:border-orange-300 transition-all">Snacks</button>
            <button onclick="applyFilter('Produce')" class="cat-btn px-6 py-2 rounded-full border border-gray-200 bg-white text-sm font-semibold text-gray-600 hover:border-orange-300 transition-all">Produce</button>
        </div>

        <div id="loader" class="flex flex-col items-center justify-center py-20 text-gray-400">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-orange-500 mb-4"></div>
            <p>Fetching fresh items...</p>
        </div>

        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000/products';
        const IMAGE_BASE_URL = 'http://localhost:3000/uploads/';
        let currentCategory = '';

        // Load all products initially
        document.addEventListener('DOMContentLoaded', () => loadProducts());

        async function loadProducts(query = '') {
            const loader = document.getElementById('loader');
            const grid = document.getElementById('productGrid');
            
            loader.classList.remove('hidden');
            grid.classList.add('opacity-40');

            try {
                const response = await fetch(`${API_URL}${query}`);
                const products = await response.json();
                renderProducts(products);
            } catch (err) {
                grid.innerHTML = `<p class="col-span-full text-center text-red-500">Failed to connect to server.</p>`;
            } finally {
                loader.classList.add('hidden');
                grid.classList.remove('opacity-40');
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            if (products.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-10 text-gray-400">No products found in this category.</p>`;
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 group">
                    <div class="relative h-52 overflow-hidden bg-gray-50">
                        <img src="${IMAGE_BASE_URL + p.image}" 
                             class="w-full h-full object-cover group-hover:scale-110 transition duration-500"
                             onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=400';">
                        <div class="absolute top-3 right-3">
                            <span class="bg-white/90 backdrop-blur px-2 py-1 rounded-lg text-[10px] font-bold text-orange-600 shadow-sm uppercase tracking-tighter">
                                ${p.category}
                            </span>
                        </div>
                    </div>
                    <div class="p-5">
                        <h3 class="font-bold text-gray-900 leading-tight mb-1 truncate">${p.name}</h3>
                        <p class="text-xs text-gray-400 mb-4">${p.stock > 0 ? 'In Stock' : 'Out of Stock'}</p>
                        <div class="flex items-center justify-between">
                            <div class="flex flex-col">
                                <span class="text-xs text-gray-400 font-medium">Price</span>
                                <span class="text-lg font-black text-gray-900">${Number(p.price).toLocaleString()} <span class="text-[10px] font-normal">RWF</span></span>
                            </div>
                            <button onclick="updateCart(1)" class="h-10 w-10 bg-orange-50 text-orange-600 rounded-xl flex items-center justify-center hover:bg-orange-600 hover:text-white transition-all shadow-sm">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Category Filtering Logic
        function applyFilter(category) {
            currentCategory = category;
            
            // UI Update
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('active-cat');
                if(btn.innerText === category || (category === '' && btn.innerText === 'All Items')) {
                    btn.classList.add('active-cat');
                }
            });

            const query = category ? `?category=${category}` : '';
            loadProducts(query);
        }

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value;
            const query = val ? `?search=${val}` : (currentCategory ? `?category=${currentCategory}` : '');
            loadProducts(query);
        });

        // Cart counter demo
        let count = 0;
        function updateCart(n) {
            count += n;
            document.getElementById('cartCount').innerText = count;
        }
    </script>
</body>
</html>
